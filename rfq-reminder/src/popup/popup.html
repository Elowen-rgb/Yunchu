<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>询价提醒助手</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <header class="header">
      <h1>&#x1F514; 询价提醒助手</h1>
      <div class="header-actions">
        <button id="scanBtn" class="btn btn-primary">识别本页询价</button>
        <button id="optionsLink" class="btn btn-icon" title="设置">&#x2699;</button>
      </div>
    </header>

    <!-- 筛选标签 -->
    <nav class="filter-tabs">
      <button class="filter-tab active" data-filter="urgent">&#x26A0; 即将到期</button>
      <button class="filter-tab" data-filter="today">&#x1F4C5; 今天到期</button>
      <button class="filter-tab" data-filter="expired">&#x274C; 已过期</button>
      <button class="filter-tab" data-filter="all">&#x1F4CB; 全部</button>
    </nav>

    <!-- 项目列表 -->
    <div id="projectList" class="project-list">
      <div class="empty-state">
        <div class="empty-icon">&#x1F4ED;</div>
        <p>暂无询价项目</p>
        <p class="empty-hint">打开采购/询价网页，点击"识别本页询价"</p>
      </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
      <span id="projectCount">0 个项目</span>
      <button id="openOptions" class="btn btn-sm">更多设置</button>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
